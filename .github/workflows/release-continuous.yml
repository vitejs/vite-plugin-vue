name: Publish Any Commit
on: [push, pull_request]

permissions: {}

jobs:
  build:
    if: github.repository == 'vitejs/vite-plugin-vue'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: lts/*
          # disable cache, to avoid cache poisoning (https://docs.zizmor.sh/audits/#cache-poisoning)
          package-manager-cache: false

      - name: Disallow installation scripts
        run: yq '.allowBuilds[]=false' -i pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish
        # zizmor: ignore[use-trusted-publishing]
        run: pnpm dlx pkg-pr-new@0.0 publish --pnpm --compact './packages/*' --packageManager=pnpm,npm,yarn --commentWithDev
