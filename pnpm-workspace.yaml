packages:
  - 'packages/*'
  - 'playground/**'

catalog:
  'vue': ^3.5.32
  'vite': ^8.0.5
  'vue-router': ^5.0.4

overrides:
  '@vitejs/plugin-vue': workspace:*

minimumReleaseAgeExclude:
  - '*'

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - core-js
  - esbuild
  - less

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - playwright-chromium
  - simple-git-hooks
  - unrs-resolver

hoistPattern:
  - postcss
  - pug # playground/vue > @vue/compiler-sfc
  - ts-node # playground/tailwind

autoInstallPeers: false

strictPeerDependencies: false

shellEmulator: true
