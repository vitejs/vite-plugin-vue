packages:
  - 'packages/*'
  - 'playground/**'

catalog:
  'vue': ^3.5.34
  'vite': ^8.0.13
  'vue-router': ^5.0.7

overrides:
  '@vitejs/plugin-vue': workspace:*

minimumReleaseAgeExclude:
  - '*'

allowBuilds:
  '@tailwindcss/oxide': true
  'playwright-chromium': true
  'simple-git-hooks': true
  'unrs-resolver': true
  '@parcel/watcher': false
  '@swc/core': false
  'core-js': false
  'esbuild': false
  'less': false

hoistPattern:
  - postcss
  - pug # playground/vue > @vue/compiler-sfc
  - ts-node # playground/tailwind

autoInstallPeers: false

strictPeerDependencies: false

shellEmulator: true

dedupePeers: true
